  --shadow     : 0 1px 4px rgba(10,22,40,.08), 0 4px 16px rgba(10,22,40,.06);
  --shadow-sm  : 0 1px 3px rgba(10,22,40,.1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; -webkit-font-smoothing: antialiased; }

/* ── App shell ── */
#app { display: flex; flex-direction: column; height: 100dvh; max-width: 900px; margin: 0 auto; background: var(--surface); box-shadow: var(--shadow); }

/* ── Header ── */
header { background: linear-gradient(135deg, #0A1628 0%, #0d1f3c 60%, #0f2548 100%); padding: 0 20px; flex-shrink: 0; position: relative; overflow: hidden; }
header::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 80% 50%, rgba(0,102,204,.2) 0%, transparent 65%); pointer-events:none; }
.header-inner { display:flex; align-items:center; justify-content:space-between; padding:14px 0; gap:12px; position:relative; z-index:1; }
.val-brand { display:flex; align-items:center; gap:10px; }
.val-icon { width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:17px; flex-shrink:0; }
.val-name { font-size:20px; font-weight:600; color:#fff; letter-spacing:-.3px; }
.val-sub { font-size:11px; color:rgba(255,255,255,.65); margin-top:1px; font-weight:400; letter-spacing:.2px; }
.header-right { display:flex; align-items:center; gap:10px; }
#new-chat-btn { font-size:12px; font-weight:500; color:#fff; background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.22); border-radius:var(--radius-sm); padding:6px 12px; cursor:pointer; transition:background .15s; white-space:nowrap; font-family:inherit; }
#new-chat-btn:hover { background:rgba(255,255,255,.2); }
.status-bar { display:flex; align-items:center; gap:7px; padding:8px 0 12px; position:relative; z-index:1; }
.status-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.35); flex-shrink:0; transition:background .3s; }
.status-dot.ok   { background:#4ade80; box-shadow:0 0 5px rgba(74,222,128,.5); }
.status-dot.spin { background:#fbbf24; animation:pulse 1.2s infinite; }
.status-dot.bad  { background:#f87171; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.status-text { font-size:11.5px; color:rgba(255,255,255,.7); }
.cat-tag { margin-left:auto; font-size:10.5px; color:rgba(255,255,255,.5); font-family:monospace; background:rgba(0,0,0,.15); padding:2px 7px; border-radius:4px; }

/* ── Chat ── */
#chat-wrap { flex:1; display:flex; flex-direction:column; overflow:hidden; }
#chat { flex:1; overflow-y:auto; padding:20px 20px 12px; display:flex; flex-direction:column; gap:18px; scroll-behavior:smooth; }
#chat::-webkit-scrollbar { width:4px; }
#chat::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ── Empty state ── */
#empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:32px 20px; gap:8px; }
.empty-sparkle { font-size:32px; margin-bottom:4px; }
.empty-title { font-size:16px; font-weight:600; color:var(--teal-dark); }
.empty-sub { font-size:13px; color:var(--text-muted); max-width:360px; }
.chips { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-top:14px; max-width:580px; }
.chip { padding:6px 13px; background:var(--teal-pale); border:1px solid var(--border); border-radius:20px; font-size:12px; color:var(--teal-dark); cursor:pointer; transition:all .15s; font-weight:500; }
.chip:hover { background:var(--teal-light); border-color:var(--teal-bright); }

/* ── Messages ── */
.msg-row { display:flex; gap:10px; align-items:flex-start; }
.msg-row.user { flex-direction:row-reverse; }
.avatar { width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; }
.avatar.val  { background:#ffffff; overflow:hidden; padding:2px; border:1.5px solid #e0e8f0; }
.avatar.user { background:#e8f4f3; color:var(--teal-dark); }
.msg-body { flex:1; min-width:0; }
.msg-row.user .msg-body { display:flex; flex-direction:column; align-items:flex-end; }
.bubble { padding:11px 14px; border-radius:var(--radius-lg); font-size:13.5px; line-height:1.65; max-width:100%; }
.msg-row.user .bubble { background:var(--teal-dark); color:#fff; border-radius:var(--radius-lg) var(--radius-lg) 4px var(--radius-lg); max-width:75%; }
.msg-row.bot .bubble { background:var(--surface); border:1px solid var(--border); border-radius:4px var(--radius-lg) var(--radius-lg) var(--radius-lg); color:var(--text); box-shadow:var(--shadow-sm); }
.stage { font-size:11.5px; font-weight:500; color:var(--amber); display:flex; align-items:center; gap:5px; padding:0 2px 4px; }
.stage.done { color:var(--green); }
.stage.err  { color:var(--red); }
.dots { display:inline-flex; gap:4px; align-items:center; padding:6px 2px; }
.dots span { width:5px; height:5px; border-radius:50%; background:var(--border-mid); animation:bop .9s infinite; }
.dots span:nth-child(2) { animation-delay:.15s; }
.dots span:nth-child(3) { animation-delay:.3s; }
@keyframes bop { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

/* ── Blocks ── */
.block { margin-top:8px; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; font-size:12px; }
.block-hd { display:flex; align-items:center; justify-content:space-between; padding:7px 12px; background:var(--teal-pale); border-bottom:1px solid var(--border); }
.block-label { font-size:10.5px; font-weight:600; text-transform:none; letter-spacing:.7px; color:var(--teal-dark); }
.block-toggle { background:none; border:none; font-size:11.5px; color:var(--teal); cursor:pointer; font-family:inherit; font-weight:500; padding:0; }
.block-toggle:hover { color:var(--teal-dark); }
.block-body { display:none; }
.block-body.open { display:block; }
pre.sql-pre { padding:10px 13px; background:#f8fafa; font-family:monospace; font-size:11.5px; color:var(--teal-dark); white-space:pre-wrap; word-break:break-word; line-height:1.55; }
.tbl-wrap { overflow-x:auto; max-height:280px; overflow-y:auto; }
table.dt { width:100%; border-collapse:collapse; font-size:11.5px; font-family:monospace; }
table.dt th { padding:6px 10px; text-align:left; background:var(--teal-pale); color:var(--teal-dark); font-weight:600; border-bottom:1px solid var(--border); position:sticky; top:0; white-space:nowrap; font-size:10.5px; text-transform:none; letter-spacing:.5px; }
table.dt td { padding:5px 10px; border-bottom:1px solid var(--border); color:var(--text-mid); white-space:nowrap; }
table.dt tr:last-child td { border:none; }
table.dt tr:hover td { background:var(--teal-pale); }
tr.row-selected td { background:#fff3ec !important; }
.filter-badge { display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:#e0eaf8;border:1px solid #b3ccea;border-radius:12px;font-size:11px;color:#0a1628; }
.filter-badge button { background:none;border:none;cursor:pointer;color:#0066cc;font-size:13px;line-height:1;padding:0 2px;font-weight:700; }
.filter-badge-clear { background:none;border:1px solid #cc4444;border-radius:10px;cursor:pointer;color:#cc4444;font-size:11px;padding:2px 8px; }
.filter-count { color:#6b7a96;font-size:11px; }
.no-filter-data { padding:20px;text-align:center;font-size:12px;color:#6b7a96; }
.err-box { background:#fef2f2; border:1px solid #fecaca; border-radius:var(--radius); padding:10px 13px; font-size:12.5px; color:var(--red); margin-top:6px; }

/* ── Charts ── */
.charts-wrap { display:flex; gap:12px; padding:12px; flex-wrap:wrap; align-items:flex-start; }
.chart-box { flex:1; min-width:160px; }
.chart-box.chart-fleet { flex:0 0 200px; max-width:220px; }
.chart-box.chart-map   { flex:2; min-width:280px; }
.chart-box h4 { font-size:10.5px; font-weight:600; text-transform:none; letter-spacing:.6px; color:var(--teal-dark); margin-bottom:6px; }
.chart-box canvas { max-height:170px; }
.chart-solo { padding:12px; }
.chart-solo canvas { max-height:220px; width:100% !important; }

/* ── Side-by-side bar + table ── */
.sidebyside-wrap { display:flex; align-items:stretch; min-height:0; }
.sidebyside-bar  { flex:1 1 50%; max-width:50%; padding:10px 10px 8px; display:flex; flex-direction:column; border-right:1px solid var(--border); }
.sidebyside-bar h4 { font-size:10.5px; font-weight:600; color:var(--teal-dark); margin-bottom:6px; letter-spacing:.5px; flex-shrink:0; }
.sidebyside-bar .chart-fill { flex:1; min-height:0; position:relative; }
.sidebyside-bar canvas { width:100% !important; height:100% !important; }
.sidebyside-table { flex:1 1 50%; max-width:50%; min-width:0; overflow:hidden; display:flex; flex-direction:column; }
.sidebyside-table .block-hd { border-top:none; border-bottom:1px solid var(--border); }
.sidebyside-table .tbl-wrap { flex:1; overflow-y:auto; }

/* ── Map own container ── */
.map-container-block { border-bottom:1px solid var(--border); padding:12px; background:var(--surface); }
.map-container-block h4 { font-size:10.5px; font-weight:600; color:var(--teal-dark); margin-bottom:6px; letter-spacing:.5px; }

/* ── Contact masking ── */
.contact-masked { filter:blur(4px); user-select:none; pointer-events:none; }

/* ── Lead gate ── */
.lead-gate { margin:12px 14px 14px; border:1.5px solid var(--teal-bright); border-radius:var(--radius-lg); overflow:hidden; }
.lead-gate-hd { padding:12px 16px 8px; background:linear-gradient(135deg, #0A1628, #0066CC); color:#fff; }
.lead-gate-title { font-size:13px; font-weight:600; margin-bottom:2px; }
.lead-gate-sub { font-size:11px; color:rgba(255,255,255,.75); }
.lead-gate-body { padding:14px 16px; display:flex; flex-direction:column; gap:9px; background:var(--teal-pale); }
.lead-row { display:flex; gap:9px; }
.lead-field { flex:1; display:flex; flex-direction:column; gap:3px; }
.lead-field label { font-size:10.5px; font-weight:600; color:var(--teal-dark); text-transform:none; letter-spacing:.5px; }
.lead-field input { padding:7px 10px; border:1.5px solid var(--border-mid); border-radius:var(--radius-sm); font-size:13px; font-family:inherit; color:var(--text); background:var(--surface); outline:none; transition:border-color .2s; }
.lead-field input:focus { border-color:var(--teal-bright); }
.lead-field input::placeholder { color:var(--text-muted); }
.lead-submit { width:100%; padding:10px; background:#0066CC; color:#fff; border:none; border-radius:var(--radius); font-size:13px; font-weight:600; font-family:inherit; cursor:pointer; transition:background .15s; margin-top:2px; }
.lead-submit:hover { background:#0055b3; }
.lead-submit:disabled { opacity:.45; cursor:not-allowed; }
.lead-success { margin:10px 14px 14px; padding:11px 14px; background:#ecfdf5; border:1px solid #6ee7b7; border-radius:var(--radius); font-size:12.5px; color:var(--green); font-weight:500; }

/* ── Headline numbers ── */
.stat-number { font-weight:700; font-size:1.1em; color:var(--navy); letter-spacing:-.3px; }
.block-label-count { font-weight:700; font-size:11.5px; }


.input-area { padding:12px 16px 14px; border-top:1px solid var(--border); background:var(--surface); flex-shrink:0; }
.input-row { display:flex; gap:8px; align-items:flex-end; background:var(--bg); border:1.5px solid var(--border-mid); border-radius:var(--radius-lg); padding:8px 8px 8px 14px; transition:border-color .2s; }
.input-row:focus-within { border-color:var(--teal-bright); }
textarea#q { flex:1; background:transparent; border:none; outline:none; resize:none; font-size:13.5px; font-family:inherit; color:var(--text); min-height:22px; max-height:100px; line-height:1.55; padding:0; }
textarea#q::placeholder { color:var(--text-muted); }
#send { width:34px; height:34px; background:#0066CC; border:none; border-radius:var(--radius-sm); cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .15s, opacity .15s; }
#send:hover { background:#0055b3; }
#send:disabled { opacity:.35; cursor:not-allowed; }
#send svg { width:15px; height:15px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.input-hint { font-size:10.5px; color:var(--text-muted); margin-top:6px; text-align:center; }

@media (max-width:640px) {
  .val-name { font-size:17px; }
  header { padding:0 14px; }
  .header-inner { padding:10px 0; }
  .msg-row.user .bubble { max-width:90%; }
  #chat { padding:14px 12px 10px; gap:14px; }
  .input-area { padding:10px 12px 12px; }
  .chips { gap:5px; }
  .chip { font-size:11px; padding:5px 10px; }
  .lead-row { flex-direction:column; }
  .charts-wrap { flex-direction:column; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="header-inner">
      <div class="val-brand">
        <div class="val-icon">
          <img src="/App_logo.png" alt="BiBi" style="width:36px;height:36px;object-fit:contain;" onerror="this.style.display='none';this.parentElement.textContent='b'">
        </div>
        <div>
          <div class="val-name">BiBi</div>
          <div class="val-sub" style="font-size:10.5px;color:rgba(255,255,255,.75);font-weight:500;letter-spacing:.1px;">
            <span style="color:#4ade80;font-weight:600;">Beta Preview</span> · Data reflects intent signals from the past 30 days
          </div>
        </div>
      </div>
      <div class="header-right">
        <button id="new-chat-btn" onclick="newChat()">+ New Chat</button>
      </div>
    </div>
    <div class="status-bar">
      <div class="status-dot spin" id="sdot"></div>
      <span class="status-text" id="stxt">Connecting…</span>
      <span class="cat-tag" id="cat-tag" style="display:none">—</span>
    </div>
  </header>

  <div id="chat-wrap">
    <div id="chat">
      <div id="empty">
        <div class="empty-sparkle">✦</div>
        <div class="empty-title" id="e-title">Connecting…</div>
        <div class="empty-sub" id="e-sub">warming up.</div>
        <div class="chips" id="chips"></div>
        <div id="beta-note" style="display:none;margin-top:18px;padding:8px 16px;background:#fff;border:1px solid var(--border);border-radius:20px;font-size:11.5px;color:var(--text-muted);letter-spacing:.2px;">
          <span style="font-weight:600;color:var(--blue);">Beta Preview</span> · Data reflects intent signals from the past 30 days
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <textarea id="q" placeholder="Ask BiBi about fleet companies, contacts, or market sizing…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
          oninput="resize(this)" disabled></textarea>
        <button id="send" onclick="send()" disabled>
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for new line</div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────
let history          = [];
let busy             = false;
let sessionToken     = null;
let turnNumber       = 0;
// Generate a session ID that persists for this browser tab
const SESSION_ID = 'sess_' + Math.random().toString(36).slice(2) + '_' + Date.now();

// Chart palette
const CHART_COLORS = [
  '#0066CC','#0A1628','#3399FF','#004d99','#66b3ff',
  '#e07b39','#f4c542','#5b8dd9','#22a06b','#9b59b6'
];

// ── Boot ──────────────────────────────────────────────────────
(async () => {
  try {
    const cfg = await fetch('/config').then(r => r.json());
    document.getElementById('cat-tag').textContent = `${cfg.catalog}.${cfg.schema}`;
  } catch (_) {}
  renderChips([
    "Show me a list of companies researching telematics solutions",
    "I'd like to offer Route Optimization solutions to companies having 500+ fleets",
    "I need to build an outreach program to companies looking for Fleet Fuel cards"
  ]);

  // Enable UI immediately — don't block on slow Databricks ping
  setStatus('ok', 'Connected · Ready');
  document.getElementById('e-title').textContent = 'Ask BiBi';
  document.getElementById('e-sub').textContent   = "Hi, I'm BiBi — BBM's Fleet Market Intelligence Assistant. Ask me about fleet companies, buyer contacts, or market sizing across BBM's fleet verticals.";
  document.getElementById('beta-note').style.display = 'block';
  document.getElementById('q').disabled    = false;
  document.getElementById('send').disabled = false;

  // Verify connection quietly in background
  fetch('/api/ping').then(r => r.json()).then(res => {
    if (!res.ok) setStatus('spin', 'Reconnecting…');
  }).catch(() => setStatus('spin', 'Connecting…'));
})();

function setStatus(type, text) {
  document.getElementById('sdot').className = 'status-dot ' + type;
  document.getElementById('stxt').textContent = text;
}

// ── Chips ──────────────────────────────────────────────────────
function renderChips(qs) {
  document.getElementById('chips').innerHTML =
    qs.map(q => `<div class="chip" onclick="setQ(this.innerText)">${esc(q)}</div>`).join('');
}
function setQ(t) {
  if (busy) return;
  const ta = document.getElementById('q');
  ta.value = t; ta.focus(); resize(ta);
  send();
}

// ── New chat ──────────────────────────────────────────────────
function newChat() {
  if (busy) return;
  history = []; history._rollingContext = ""; turnNumber = 0;
  const chat = document.getElementById('chat');
  chat.innerHTML = '';
  const empty = document.createElement('div');
  empty.id = 'empty';
  empty.innerHTML = `
    <div class="empty-sparkle">✦</div>
    <div class="empty-title">Ask BiBi</div>
    <div class="empty-sub">Start a new conversation about your fleet market data.</div>
    <div class="chips" id="chips"></div>
    <div style="margin-top:18px;padding:8px 16px;background:#fff;border:1px solid var(--border);border-radius:20px;font-size:11.5px;color:var(--text-muted);letter-spacing:.2px;">
      <span style="font-weight:600;color:var(--blue);">Beta Preview</span> · Data reflects intent signals from the past 30 days
    </div>`;
  chat.appendChild(empty);
  renderChips([
    "Show me a list of companies researching telematics solutions",
    "I'd like to offer Route Optimization solutions to companies having 500+ fleets",
    "I need to build an outreach program to companies looking for Fleet Fuel cards"
  ]);
}

function resize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,100)+'px'; }
function scrollBot() { const c=document.getElementById('chat'); c.scrollTop=c.scrollHeight; }

function appendMsg(role, html) {
  document.getElementById('empty')?.remove();
  const chat=document.getElementById('chat');

function toggleBlock(id, btn) {
  const el=document.getElementById(id);
  if (!el) return;
  const open=el.classList.toggle('open');
  btn.textContent=open?'hide':'show';
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt(text) {
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`(.+?)`/g,'<code style="font-family:monospace;font-size:11.5px;background:#f0f5fb;color:var(--navy);padding:1px 5px;border-radius:4px">$1</code>')
    .replace(/\b(\d{1,3}(?:,\d{3})+|\d{4,})\b/g,'<strong style="font-size:1.05em;color:var(--navy)">$1</strong>')
    .replace(/^[-•] (.+)$/gm,'<li style="margin-left:16px;margin-bottom:0px">$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li style="margin-left:16px;margin-bottom:0px">$1</li>')
    .replace(/(<li[^>]*>.*?<\/li>)(\s*<br>\s*(<li[^>]*>))/g, '$1$3')
    .replace(/(<li[^>]*>(?:.*?<\/li>\s*)+)/gs, '<ul style="margin:4px 0;padding-left:16px;list-style:disc">$1</ul>')
    .replace(/\n/g,'<br>')
    .replace(/<\/li><br>/g, '</li>');
}

// ── Chart helpers ───────────────────────────────────────────
// ── Chart state ──────────────────────────────────────────────
let chartInstances = {};

// Cross-filter state, keyed by chrId
const summaryRowsStore = new Map(); // chrId → [[name, state, fleet], ...]
const filterStateStore  = new Map(); // chrId → { state: null|string, fleet: null|string }
const tableRowsStore    = new Map(); // chrId → { cols, prettycols, rows, twId }

// Module-level palette used by rerender() outside renderSmartCharts scope
const CHART_PALETTE = [
  '#0066CC','#0A1628','#3399FF','#004d99','#66b3ff',
  '#e07b39','#f4c542','#5b8dd9','#22a06b','#9b59b6','#34495e','#16a085'
];

// barContainerId  → renders fleet bar chart directly into this element
// mapContainerId  → renders US heatmap directly into this element (optional, defaults to barContainerId for legacy)
function renderSmartCharts(cols, rows, barContainerId, mapContainerId) {
  const barContainer = document.getElementById(barContainerId);
  if (!barContainer) return false;
  // If no separate map container provided, fall back to old single-container mode
  const mapContainer = mapContainerId ? document.getElementById(mapContainerId) : null;

  const lower = cols.map(c => c.toLowerCase());
  const PALETTE = CHART_PALETTE;

  // Extract chrId from barContainerId ("barchart_chr_XXXX" → "chr_XXXX")
  const chrId = barContainerId.replace('barchart_', '');

  let barRendered = false;
  let mapRendered = false;

  // helper: render bar into barContainer
  function doBar(title, data, isFleet) {
    const cid = barContainerId + '_bar';
    barContainer.innerHTML = `<h4 style="font-size:10.5px;font-weight:600;color:var(--teal-dark);margin-bottom:6px;letter-spacing:.5px;">${title}</h4><div class="chart-fill"><canvas id="${cid}"></canvas></div>`;

    if (isFleet) renderFleetBarChart(cid, data, PALETTE, chrId);
    else         renderBarChart(cid, data, PALETTE);
    barRendered = true;
  }

  // helper: render map / fallback bar into mapContainer
  function doMap(title, data, isState) {
    const target = mapContainer || barContainer;
    if (!target) return;
    if (isState) {
      const mid = barContainerId + '_statemap';
      target.innerHTML = `<h4 class="map-container-block-title" style="font-size:10.5px;font-weight:600;color:var(--teal-dark);margin-bottom:6px;letter-spacing:.5px;">${title}</h4><div id="${mid}" style="width:100%;"></div>`;
      renderUSHeatmap(mid, data, barContainerId, chrId);
    } else {
      const cid = barContainerId + '_rev';
      target.innerHTML = `<h4 style="font-size:10.5px;font-weight:600;color:var(--teal-dark);margin-bottom:6px;letter-spacing:.5px;">${title}</h4><canvas id="${cid}" style="width:100%!important;"></canvas>`;
      renderBarChart(cid, data, PALETTE);
    }
    mapRendered = true;
  }

  // ── TAM UNION ALL format ──────────────────────────────────────
  const hasSectionCol = lower.includes('section');
  const hasLabelCol   = lower.includes('breakdown_label');
  const hasCountCol   = lower.includes('company_count');

  if (hasSectionCol && hasLabelCol && hasCountCol) {
    const secIdx = lower.indexOf('section');
    const lblIdx = lower.indexOf('breakdown_label');
    const cntIdx = lower.indexOf('company_count');

    const fleetRows = rows.filter(r => String(r[secIdx]).toLowerCase() === 'fleet');
    const stateRows = rows.filter(r => String(r[secIdx]).toLowerCase() === 'state');
    const indRows   = rows.filter(r => String(r[secIdx]).toLowerCase() === 'industry');
    const revRows   = rows.filter(r => String(r[secIdx]).toLowerCase() === 'revenue');

    const fleetSource = fleetRows.length >= 1 ? fleetRows : indRows;
    if (fleetSource.length >= 1) {
      const fData = fleetSource
        .filter(r => r[lblIdx] && r[lblIdx] !== 'null' && r[lblIdx] !== '')
        .map(r => ({ label: String(r[lblIdx]), value: parseFloat(r[cntIdx]) || 0 }));
      if (fData.length >= 1) {
        const title = fleetRows.length >= 1 ? '🚛 Fleet Size Distribution' : '🏭 Industry Breakdown';
        doBar(title, fData, true);
      }
    }

    const stateSource = stateRows.length >= 1 ? stateRows : revRows;
    if (stateSource.length >= 1) {
      const sData = stateSource
        .filter(r => r[lblIdx] && r[lblIdx] !== 'null' && r[lblIdx] !== '')
        .map(r => ({ label: String(r[lblIdx]), value: parseFloat(r[cntIdx]) || 0 }));
      if (sData.length >= 1) {
        const title = stateRows.length >= 1 ? '🗺️ Companies by State' : '💰 Revenue Distribution';
        doMap(title, sData, stateRows.length >= 1);
      }
    }

    return barRendered || mapRendered;
  }

  // ── Legacy direct columns ──────────────────────────────────
  const hasFleet    = lower.includes('fleet_size');
  const stateColIdx = lower.findIndex(c => c === 'companystate' || c === 'company_state');
  const hasIndustry = lower.includes('company_industry');
  const hasRevenue  = lower.includes('company_revenue_range');
  const countIdx    = lower.findIndex(c => c.includes('count'));

  if (hasFleet) {
    const fleetIdx = lower.indexOf('fleet_size');
    let data;
    if (countIdx !== -1) {
      data = [...rows].filter(r => r[fleetIdx] && r[fleetIdx] !== 'null' && r[fleetIdx] !== '')
        .sort((a,b) => parseFloat(b[countIdx]||0)-parseFloat(a[countIdx]||0))
        .map(r => ({ label: String(r[fleetIdx]), value: parseFloat(r[countIdx])||0 }));
    } else {
      const tally = {};
      rows.forEach(r => { const v=String(r[fleetIdx]||''); if(!v||v==='null')return; tally[v]=(tally[v]||0)+1; });
      data = Object.entries(tally).map(([label,value])=>({label,value}));
    }
    if (data.length >= 1) doBar('🚛 Fleet Size Distribution', data, true);
  } else if (hasIndustry) {
    const indIdx = lower.indexOf('company_industry');
    let data;
    if (countIdx !== -1) {
      data = [...rows].filter(r => r[indIdx] && r[indIdx] !== 'null' && r[indIdx] !== '')
        .sort((a,b) => parseFloat(b[countIdx]||0)-parseFloat(a[countIdx]||0)).slice(0,10)
        .map(r => ({ label: String(r[indIdx]), value: parseFloat(r[countIdx])||0 }));
    } else {
      const seen=new Set(), tally={};
      rows.forEach(r => {
        const compIdx=lower.indexOf('company_name');
        const key=compIdx!==-1?String(r[compIdx]):null;
        const ind=String(r[indIdx]||'');
        if(!ind||ind==='null')return;
        if(key&&seen.has(key+'|'+ind))return;
        if(key)seen.add(key+'|'+ind);
        tally[ind]=(tally[ind]||0)+1;
      });
      data=Object.entries(tally).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([label,value])=>({label,value}));
    }
    if (data.length >= 1) doBar('🏭 Industry Breakdown', data, true);
  }

  if (stateColIdx !== -1) {
    let data;
    if (countIdx !== -1) {
      data = [...rows].filter(r => r[stateColIdx] && r[stateColIdx] !== 'null' && r[stateColIdx] !== '')
        .map(r => ({ label: String(r[stateColIdx]), value: parseFloat(r[countIdx])||0 }));
    } else {
      const tally={};
      rows.forEach(r => { const v=String(r[stateColIdx]||''); if(!v||v==='null')return; tally[v]=(tally[v]||0)+1; });
      data=Object.entries(tally).map(([label,value])=>({label,value}));
    }
    if (data.length >= 1) doMap('🗺️ Companies by State', data, true);
  } else if (hasRevenue) {
    const revIdx=lower.indexOf('company_revenue_range');
    let data;
    if (countIdx !== -1) {
      data=[...rows].filter(r=>r[revIdx]&&r[revIdx]!=='null'&&r[revIdx]!=='')
        .map(r=>({label:String(r[revIdx]),value:parseFloat(r[countIdx])||0}));
    } else {
      const seen=new Set(),tally={};
      rows.forEach(r=>{
        const compIdx=lower.indexOf('company_name');
        const key=compIdx!==-1?String(r[compIdx]):null;
        const rev=String(r[revIdx]||'');
        if(!rev||rev==='null')return;
        if(key&&seen.has(key+'|'+rev))return;
        if(key)seen.add(key+'|'+rev);
        tally[rev]=(tally[rev]||0)+1;
      });
      data=Object.entries(tally).map(([label,value])=>({label,value}));
    }
    if (data.length >= 2) doMap('💰 Revenue Distribution', data, false);
  }

  return barRendered || mapRendered;
}

// ── Cross-filter helpers ──────────────────────────────────────

function applyFilter(chrId, newFilter) {
  const cur = filterStateStore.get(chrId) || { state: null, fleet: null };
  filterStateStore.set(chrId, {
    state: 'state' in newFilter ? (cur.state === newFilter.state ? null : newFilter.state) : cur.state,
    fleet: 'fleet' in newFilter ? (cur.fleet === newFilter.fleet ? null : newFilter.fleet) : cur.fleet,
  });
  rerender(chrId);
}

function clearFilters(chrId) {
  filterStateStore.set(chrId, { state: null, fleet: null });
  rerender(chrId);
}

function rerender(chrId) {
  const filter  = filterStateStore.get(chrId) || { state: null, fleet: null };
  const allRows = summaryRowsStore.get(chrId) || [];
  const COL_STATE = 1, COL_FLEET = 2;

  const filtered = allRows.filter(r =>
    (!filter.state || r[COL_STATE] === filter.state) &&
    (!filter.fleet || r[COL_FLEET] === filter.fleet)
  );

  // Recompute fleet and state aggregates
  const fleetTally = {}, stateTally = {};
  filtered.forEach(r => {
    const f = r[COL_FLEET]; if (f && f !== 'null' && f !== '') fleetTally[f] = (fleetTally[f]||0)+1;
    const s = r[COL_STATE]; if (s && s !== 'null' && s !== '') stateTally[s] = (stateTally[s]||0)+1;
  });
  const fleetData = Object.entries(fleetTally).map(([label,value])=>({label,value}));
  const stateData = Object.entries(stateTally).map(([label,value])=>({label,value}));

  // Re-render bar chart
  const barCont = document.getElementById('barchart_' + chrId);
  if (barCont) {
    const cid = 'barchart_' + chrId + '_bar';
    if (fleetData.length) {
      barCont.innerHTML = `<h4 style="font-size:10.5px;font-weight:600;color:var(--teal-dark);margin-bottom:6px;letter-spacing:.5px;">🚛 Fleet Size Distribution</h4><div class="chart-fill"><canvas id="${cid}"></canvas></div>`;
      renderFleetBarChart(cid, fleetData, CHART_PALETTE, chrId);
    } else {
      barCont.innerHTML = `<div class="no-filter-data">No fleet data for this filter.</div>`;
    }
  }

  // Re-render map
  const mapCont = document.getElementById('mapinner_' + chrId);
  if (mapCont) {
    const mid = 'barchart_' + chrId + '_statemap';
    if (stateData.length) {
      mapCont.innerHTML = `<h4 class="map-container-block-title" style="font-size:10.5px;font-weight:600;color:var(--teal-dark);margin-bottom:6px;letter-spacing:.5px;">🗺️ Companies by State</h4><div id="${mid}" style="width:100%;"></div>`;
      renderUSHeatmap(mid, stateData, 'barchart_' + chrId, chrId);
    } else {
      mapCont.innerHTML = `<div class="no-filter-data">No state data for this filter.</div>`;
    }
  }

  // Re-render table: filter all summary rows, then show first 5
  const stored = tableRowsStore.get(chrId);
  if (stored) {
    const lower = stored.cols.map(c => c.toLowerCase());
    const si = lower.findIndex(c => c === 'companystate' || c === 'company_state');
    const fi = lower.indexOf('fleet_size');
    const filteredTableRows = allRows.filter(r =>
      (!filter.state || (si !== -1 && r[si] === filter.state)) &&
      (!filter.fleet || (fi !== -1 && r[fi] === filter.fleet))
    );
    const tw = document.getElementById(stored.twId);
    if (tw) {
      tw.innerHTML = buildTableWithFilter(stored.cols, stored.prettycols, filteredTableRows.slice(0, 5), chrId);
      attachTableClickDelegation(tw, chrId);
    }
  }

  renderFilterBadges(chrId, filter, filtered.length);
}

function renderFilterBadges(chrId, filter, filteredCount) {
  const el = document.getElementById('filterbadges_' + chrId);
  if (!el) return;
  const badges = [];
  if (filter.state) badges.push(`<span class="filter-badge">📍 ${esc(filter.state)} <button onclick="applyFilter('${esc(chrId)}',{state:'${esc(filter.state)}'})">×</button></span>`);
  if (filter.fleet) badges.push(`<span class="filter-badge">🚛 ${esc(filter.fleet)} <button onclick="applyFilter('${esc(chrId)}',{fleet:'${esc(filter.fleet)}'})">×</button></span>`);
  if (!badges.length) { el.style.display = 'none'; el.innerHTML = ''; return; }
  const total = summaryRowsStore.get(chrId)?.length ?? 0;
  el.style.display = 'flex';
  el.innerHTML = badges.join('') +
    `<span class="filter-count">${filteredCount.toLocaleString()} of ${total.toLocaleString()} companies</span>` +
    `<button class="filter-badge-clear" onclick="clearFilters('${esc(chrId)}')">Clear all ×</button>`;
}

function buildTableWithFilter(cols, prettycols, rows, chrId) {
  const lower = cols.map(c => c.toLowerCase());
  const skipCols = new Set(['company_id','contact_id','signal_score','signal_date','rn']);
  const hasCompanyRows = lower.includes('company_name') && !lower.some(c => c.startsWith('contact_'));
  const companyDisplayOrder = ['company_name', 'company_industry', 'fleet_size', 'companycity', 'companystate'];
  const indices = hasCompanyRows
    ? companyDisplayOrder.map(c => lower.indexOf(c)).filter(i => i !== -1)
    : cols.map((_,i) => skipCols.has(lower[i]) ? -1 : i).filter(i => i !== -1);

  const si = lower.findIndex(c => c === 'companystate' || c === 'company_state');
  const fi = lower.indexOf('fleet_size');
  const activeFilter = filterStateStore.get(chrId) || { state: null, fleet: null };
  const displayCols = prettycols || cols;
  const th = indices.map(i => `<th>${esc(displayCols[i] || cols[i])}</th>`).join('');
  const tb = (rows||[]).map(r => {
    const rowState = si !== -1 ? String(r[si] ?? '') : '';
    const rowFleet = fi !== -1 ? String(r[fi] ?? '') : '';
    const isSelected = activeFilter.state && activeFilter.fleet
      ? rowState === activeFilter.state && rowFleet === activeFilter.fleet
      : activeFilter.state ? rowState === activeFilter.state
      : activeFilter.fleet ? rowFleet === activeFilter.fleet
      : false;
    return `<tr data-chr="${esc(chrId)}" data-state="${esc(rowState)}" data-fleet="${esc(rowFleet)}" style="cursor:pointer;"${isSelected?' class="row-selected"':''}>` +
      indices.map(i => {
        const val = String(r[i] ?? '');
        if (/^https?:\/\//i.test(val)) {
          return `<td><a href="${esc(val)}" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:none">${esc(val.replace(/^https?:\/\/(www\.)?/,''))}</a></td>`;
        }
        return `<td>${esc(val)}</td>`;
      }).join('') + '</tr>';
  }).join('');
  return `<table class="dt"><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table>`;
}

function attachTableClickDelegation(tw, chrId) {
  if (!tw || !summaryRowsStore.has(chrId)) return;
  // Remove previous handler to avoid stacking on re-renders
  if (tw._filterHandler) tw.removeEventListener('click', tw._filterHandler);
  tw._filterHandler = function(e) {
    const tr = e.target.closest('tr[data-chr]');
    if (!tr) return;
    const st = tr.dataset.state || null;
    const fl = tr.dataset.fleet || null;
    const newFilter = {};
    if (st) newFilter.state = st;
    if (fl) newFilter.fleet = fl;
    if (Object.keys(newFilter).length) applyFilter(tr.dataset.chr, newFilter);
  };
  tw.addEventListener('click', tw._filterHandler);
}

// ── Fleet Size Bar Chart (ordered by fleet size tiers) ──────
function renderFleetBarChart(cid, data, PALETTE, chrId) {
  const ctx = document.getElementById(cid)?.getContext('2d');
  if (!ctx) return;
  if (chartInstances[cid]) chartInstances[cid].destroy();

  // Sort fleet size tiers in logical order
  const FLEET_ORDER = ['2500+','1000-2499','500-999','250-499','250 +','100-249','50-99','25-49','10-24','5-9','1-4'];
  const sorted = [...data].sort((a, b) => {
    const ai = FLEET_ORDER.indexOf(a.label);
    const bi = FLEET_ORDER.indexOf(b.label);
    if (ai !== -1 && bi !== -1) return ai - bi;
    if (ai !== -1) return -1;
    if (bi !== -1) return 1;
    return b.value - a.value; // fallback: sort by value desc
  });

  const total = sorted.reduce((s, d) => s + d.value, 0);

  // Highlight active fleet filter bar
  const activeFleet = chrId ? filterStateStore.get(chrId)?.fleet : null;
  const bgColors = sorted.map(d =>
    activeFleet ? (d.label === activeFleet ? '#FF6B35' : 'rgba(0,102,204,0.3)') : '#0066CC'
  );

  const pctPlugin = {
    id: 'fleetPctLabels',
    afterDatasetsDraw(chart) {
      const ctx2 = chart.ctx;
      ctx2.save();
      ctx2.font = 'bold 9.5px Inter, sans-serif';
      ctx2.fillStyle = '#0A1628';
      ctx2.textAlign = 'center';
      ctx2.textBaseline = 'bottom';
      chart.getDatasetMeta(0).data.forEach((bar, idx) => {
        const val = sorted[idx]?.value || 0;
        const pct = total ? ((val/total)*100).toFixed(1) : 0;
        ctx2.fillText(`${pct}%`, bar.x, bar.y - 2);
      });
      ctx2.restore();
    }
  };

  chartInstances[cid] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(d => d.label),
      datasets: [{
        data: sorted.map(d => d.value),
        backgroundColor: bgColors,
        borderRadius: 5,
        borderSkipped: false
      }]
    },
    plugins: [pctPlugin],
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 20 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (c) => {
              const val = c.parsed.y;
              const pct = total ? ((val/total)*100).toFixed(1) : 0;
              return ` ${Number(val).toLocaleString()} companies (${pct}%)`;
            }
          }
        }
      },
      onClick: (evt, elements) => {
        if (!elements.length || !chrId || !summaryRowsStore.has(chrId)) return;
        const label = sorted[elements[0].index]?.label;
        if (label) applyFilter(chrId, { fleet: label });
      },
      scales: {
        x: { ticks: { font: { size: 9 }, maxRotation: 35 }, grid: { display: false } },
        y: { ticks: { font: { size: 10 } }, grid: { color: 'rgba(0,0,0,.05)' } }
      }
    }
  });
}

// ── US Choropleth Heatmap (D3 + TopoJSON, orange→blue gradient) ──
function renderUSHeatmap(containerId, stateData, ownerBarId, chrId) {
  const container = document.getElementById(containerId);
  if (!container) return;

  const FIPS_TO_ABBR = {
    '01':'AL','02':'AK','04':'AZ','05':'AR','06':'CA','08':'CO','09':'CT','10':'DE',
    '12':'FL','13':'GA','15':'HI','16':'ID','17':'IL','18':'IN','19':'IA','20':'KS',
    '21':'KY','22':'LA','23':'ME','24':'MD','25':'MA','26':'MI','27':'MN','28':'MS',
    '29':'MO','30':'MT','31':'NE','32':'NV','33':'NH','34':'NJ','35':'NM','36':'NY',
    '37':'NC','38':'ND','39':'OH','40':'OK','41':'OR','42':'PA','44':'RI','45':'SC',
    '46':'SD','47':'TN','48':'TX','49':'UT','50':'VT','51':'VA','53':'WA','54':'WV',
    '55':'WI','56':'WY','11':'DC'
  };
  const ABBR_TO_NAME = {
    AL:'Alabama',AK:'Alaska',AZ:'Arizona',AR:'Arkansas',CA:'California',CO:'Colorado',
    CT:'Connecticut',DE:'Delaware',FL:'Florida',GA:'Georgia',HI:'Hawaii',ID:'Idaho',
    IL:'Illinois',IN:'Indiana',IA:'Iowa',KS:'Kansas',KY:'Kentucky',LA:'Louisiana',
    ME:'Maine',MD:'Maryland',MA:'Massachusetts',MI:'Michigan',MN:'Minnesota',MS:'Mississippi',
    MO:'Missouri',MT:'Montana',NE:'Nebraska',NV:'Nevada',NH:'New Hampshire',NJ:'New Jersey',
    NM:'New Mexico',NY:'New York',NC:'North Carolina',ND:'North Dakota',OH:'Ohio',
    OK:'Oklahoma',OR:'Oregon',PA:'Pennsylvania',RI:'Rhode Island',SC:'South Carolina',
    SD:'South Dakota',TN:'Tennessee',TX:'Texas',UT:'Utah',VT:'Vermont',VA:'Virginia',
    WA:'Washington',WV:'West Virginia',WI:'Wisconsin',WY:'Wyoming',DC:'D.C.'
  };
  const NAME_TO_ABBR = Object.fromEntries(Object.entries(ABBR_TO_NAME).map(([a,n])=>[n,a]));

  const lookup = {};
  stateData.forEach(d => {
    const abbr = d.label.length===2 ? d.label.toUpperCase() : (NAME_TO_ABBR[d.label]||null);
    if (abbr) lookup[abbr] = (lookup[abbr]||0) + d.value;
  });

  const vals = Object.values(lookup);
  const maxVal = vals.length ? Math.max(...vals) : 1;

  // Blue (#0066CC) → bright green-white middle → Green (#00CC66), power scale for visibility
  function getColor(val) {
    if (!val) return '#e0e0e0'; // grey for zero states
    const t = Math.pow(val / maxVal, 0.55);
    // Two-segment interpolation: 0→0.5 = Blue→bright lime, 0.5→1 = bright lime→Green
    // This avoids any grey/muddy midpoint by going through a vivid #80FFB3 at t=0.5
    let r, g, b;
    if (t <= 0.5) {
      const s = t / 0.5;
      r = Math.round(0   + s * (128 - 0));    // 0   → 128
      g = Math.round(102 + s * (255 - 102));  // 102 → 255
      b = Math.round(204 + s * (179 - 204));  // 204 → 179
    } else {
      const s = (t - 0.5) / 0.5;
      r = Math.round(128 + s * (0   - 128));  // 128 → 0
      g = Math.round(255 + s * (204 - 255));  // 255 → 204
      b = Math.round(179 + s * (102 - 179));  // 179 → 102
    }
    return `rgb(${r},${g},${b})`;
  }

  const uid = 'umap_' + containerId.replace(/[^a-z0-9]/gi,'_');
  container.innerHTML = `<div id="${uid}_wrap" style="width:100%;min-height:220px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#6b7a96;">Loading map…</div>`;

  function buildMap(us) {
    const W = Math.max(container.offsetWidth||420, 340);
    const H = Math.round(W * 0.62);
    const proj = d3.geoAlbersUsa().scale(W * 1.3).translate([W/2, H/2]);
    const pathGen = d3.geoPath().projection(proj);
    const features = topojson.feature(us, us.objects.states).features;
    const gradId = uid+'_gr';

    let paths = '', labels = '';
    features.forEach(f => {
      const fips = String(f.id).padStart(2,'0');
      const abbr = FIPS_TO_ABBR[fips]; if (!abbr) return;
      const val = lookup[abbr]||0;
      const d = pathGen(f); if (!d) return;
      paths += `<path class="sp${val===0?' sp-zero':''}" data-a="${abbr}" data-v="${val}" data-n="${ABBR_TO_NAME[abbr]||abbr}"
        d="${d}" fill="${getColor(val)}" stroke="#fff" stroke-width="0.6"
        style="cursor:${val===0?'default':'pointer'};transition:filter .12s;${val===0?'pointer-events:none;':''}"/>`;
      if (val > 0) {
        const centroid = pathGen.centroid(f);
        const bounds = pathGen.bounds(f);
        const [cx, cy] = centroid;
        const label = val >= 1000 ? (val/1000).toFixed(1)+'k' : String(val);
        const bboxW = bounds[1][0] - bounds[0][0];
        const bboxH = bounds[1][1] - bounds[0][1];
        // fit text width (~0.55em per char) and height within the state's bounding box, cap at 10
        const fs = Math.min(bboxW * 0.82 / (label.length * 0.55), bboxH * 0.65, 12);
        if (fs >= 3) {
          labels += `<text pointer-events="none" dominant-baseline="middle" text-anchor="middle"
            x="${cx.toFixed(1)}" y="${cy.toFixed(1)}"
            font-size="${fs.toFixed(1)}" font-weight="700" fill="#6B4F2A"
            font-family="Inter,sans-serif">${label}</text>`;
        }
      }
    });

    // Build tooltip group inside SVG
    const svgHtml = `<svg id="${uid}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"
        style="width:100%;height:auto;display:block;background:#fafbfd;border-radius:8px 8px 0 0;">
      <defs>
        <linearGradient id="${gradId}" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#0066CC"/>
          <stop offset="25%"  stop-color="#00AADD"/>
          <stop offset="50%"  stop-color="#80FFB3"/>
          <stop offset="75%"  stop-color="#33DD88"/>
          <stop offset="100%" stop-color="#00CC66"/>
        </linearGradient>
      </defs>
      ${paths}
      ${labels}
      <g id="${uid}_tt" style="display:none;pointer-events:none;">
        <rect x="0" y="0" width="148" height="36" rx="6" fill="#0A1628" opacity="0.93"/>
        <text id="${uid}_t1" x="74" y="14" text-anchor="middle" font-size="10" font-weight="700" fill="#fff" font-family="Inter,sans-serif"/>
        <text id="${uid}_t2" x="74" y="27" text-anchor="middle" font-size="9" fill="#ffd0aa" font-family="Inter,sans-serif"/>
      </g>
    </svg>`;

    // Legend rendered as HTML below the SVG for clean layout
    const steps = 5;
    const tickVals = Array.from({length: steps+1}, (_,i) => Math.round(i/steps * maxVal));
    const legendHtml = `
      <div style="padding:8px 10px 10px;background:#fafbfd;border-radius:0 0 8px 8px;border-top:1px solid #e8eef7;">
        <div style="position:relative;height:12px;border-radius:4px;overflow:hidden;
          background:linear-gradient(to right,#0066CC,#00AADD,#80FFB3,#33DD88,#00CC66);">
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;">
          ${tickVals.map((v,i) => `
            <div style="display:flex;flex-direction:column;align-items:${i===0?'flex-start':i===steps?'flex-end':'center'};gap:1px;">
              <div style="width:1px;height:5px;background:#aab4c4;margin:${i===0?'0':i===steps?'0 0 0 auto':'0 auto'};"></div>
              <span style="font-size:9px;color:#6b7a96;font-family:Inter,sans-serif;font-weight:500;">
                ${v >= 1000 ? (v/1000).toFixed(1)+'k' : v}
              </span>
            </div>`).join('')}
        </div>
        <div style="text-align:center;margin-top:1px;font-size:9px;color:#9ba8bc;font-family:Inter,sans-serif;letter-spacing:.3px;">
          companies per state &nbsp;·&nbsp; blue = low &nbsp;·&nbsp; green = high
        </div>
      </div>`;

    const wrap = document.getElementById(uid+'_wrap');
    const combined = `<div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;">${svgHtml}${legendHtml}</div>`;
    if (wrap) wrap.outerHTML = combined; else container.innerHTML = combined;

    const svg = document.getElementById(uid);
    const tt  = document.getElementById(uid+'_tt');
    const t1  = document.getElementById(uid+'_t1');
    const t2  = document.getElementById(uid+'_t2');
    if (!svg || !tt) return;

    const activeState = chrId ? filterStateStore.get(chrId)?.state : null;
    svg.querySelectorAll('.sp').forEach(p => {
      if (p.classList.contains('sp-zero')) return; // no hover for zero states
      p.style.cursor = 'pointer';
      // Apply selected-state highlight at render time
      if (activeState && p.dataset.n === activeState) {
        p.style.strokeWidth = '2.5';
        p.style.stroke = '#FF6B35';
      }
      p.addEventListener('mouseenter', function() {
        this.style.filter = 'brightness(0.75)';
        if (!(activeState && this.dataset.n === activeState)) this.style.strokeWidth = '1.8';
        const v = parseInt(this.dataset.v)||0;
        t1.textContent = this.dataset.n;
        t2.textContent = `${Number(v).toLocaleString()} compan${v===1?'y':'ies'}`;
        const b = this.getBBox();
        let tx = b.x + b.width/2 - 74, ty = b.y - 44;
        if (ty < 2) ty = b.y + b.height + 4;
        if (tx < 2) tx = 2;
        if (tx + 148 > W) tx = W - 150;
        tt.setAttribute('transform', `translate(${tx},${ty})`);
        tt.style.display = 'block';
      });
      p.addEventListener('mouseleave', function() {
        this.style.filter = '';
        this.style.strokeWidth = (activeState && this.dataset.n === activeState) ? '2.5' : '0.6';
        this.style.stroke = (activeState && this.dataset.n === activeState) ? '#FF6B35' : '#fff';
        tt.style.display = 'none';
      });
      p.addEventListener('click', function() {
        if (chrId && summaryRowsStore.has(chrId)) applyFilter(chrId, { state: this.dataset.n });
      });
    });
  }

  function loadScript(src) {
    return new Promise((res,rej) => {
      if (window._scriptLoaded?.[src]) { res(); return; }
      const s = document.createElement('script'); s.src = src;
      s.onload = () => { (window._scriptLoaded = window._scriptLoaded||{})[src]=1; res(); };
      s.onerror = rej; document.head.appendChild(s);
    });
  }

  Promise.all([
    loadScript('https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js'),
    loadScript('https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js'),
  ]).then(() => fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(r => r.json()))
    .then(us => buildMap(us))
    .catch(err => {
      const w = document.getElementById(uid+'_wrap');
      if (w) w.textContent = 'Map unavailable'; console.warn('[US MAP]', err);
    });
}


// ── Bar chart with % labels on bars ──────────────────────────
function renderBarChart(cid, data, PALETTE) {
  const ctx = document.getElementById(cid)?.getContext('2d');
  if (!ctx) return;
  if (chartInstances[cid]) chartInstances[cid].destroy();

  const barTotal = data.reduce((a,b) => a+b.value, 0);

  const pctLabelPlugin = {
    id: 'barPctLabels',
    afterDatasetsDraw(chart) {
      const ctx2 = chart.ctx;
      ctx2.save();
      ctx2.font = 'bold 9.5px Inter, sans-serif';
      ctx2.fillStyle = '#0A1628';
      ctx2.textAlign = 'center';
      ctx2.textBaseline = 'bottom';
      chart.getDatasetMeta(0).data.forEach((bar, idx) => {
        const val = data[idx]?.value || 0;
        const pct = barTotal ? ((val/barTotal)*100).toFixed(1) : 0;
        ctx2.fillText(`${pct}%`, bar.x, bar.y - 2);
      });
      ctx2.restore();
    }
  };

  chartInstances[cid] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: data.map(d => d.label),
      datasets: [{ data: data.map(d => d.value), backgroundColor: PALETTE[0], borderRadius: 4 }]
    },
    plugins: [pctLabelPlugin],
    options: {
      responsive: true,
      maintainAspectRatio: false, 
      layout: { padding: { top: 18 } },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (c) => {
              const val = typeof c.parsed === 'object' ? c.parsed.y : c.parsed;
              const pct = barTotal ? ((val/barTotal)*100).toFixed(1) : 0;
              return ` ${Number(val).toLocaleString()} companies`;
            }
          }
        }
      },
      scales: {
        x: { ticks: { font: { size: 9 }, maxRotation: 40 }, grid: { display: false } },
        y: { ticks: { font: { size: 10 } }, grid: { color: 'rgba(0,0,0,.05)' } }
      }
    }
  });
}

          <div class="lead-field"><label>Phone</label><input id="lf_ph_${tblId}" type="tel" placeholder="(555) 000-0000"></div>
        </div>

          <div class="lead-field"><label>Job Title *</label><input id="lf_jt_${tblId}" type="text" placeholder="VP of Sales"></div>
          <div class="lead-field"><label>Company *</label><input id="lf_co_${tblId}" type="text" placeholder="Acme Corp"></div>
        </div>
        <button class="lead-submit" id="lf_btn_${tblId}"
          onclick="submitLead('${tblId}', ${JSON.stringify(cols).replace(/"/g,'&quot;')}, ${JSON.stringify(rows).replace(/"/g,'&quot;')})">

async function submitLead(tblId, cols, rows) {
  const get = id => document.getElementById(id)?.value?.trim() || '';
  const firstName = get(`lf_fn_${tblId}`);
  const lastName  = get(`lf_ln_${tblId}`);
  const email     = get(`lf_em_${tblId}`);
  const phone     = get(`lf_ph_${tblId}`);
  const jobTitle  = get(`lf_jt_${tblId}`);
  const company   = get(`lf_co_${tblId}`);

  if (!firstName || !lastName || !email || !jobTitle || !company) { alert('Please fill in all required fields.'); return; }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { alert('Please enter a valid work email.'); return; }

  const btn = document.getElementById(`lf_btn_${tblId}`);
  btn.disabled = true; btn.textContent = 'Submitting…';

  try {
    const resp = await fetch('/api/lead', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ firstName, lastName, email, phone, jobTitle, company, sessionId: SESSION_ID })
    });
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    sessionToken = data.sessionToken;

    // Replace gate with confirmation — data stays masked, details will be emailed
    const gate = document.getElementById(`gate_${tblId}`);
    if (gate) gate.outerHTML = `
      <div class="lead-success" style="margin:10px 0 0;padding:14px 16px;background:#ecfdf5;border:1px solid #6ee7b7;border-radius:var(--radius);font-size:13px;color:#065f46;line-height:1.6;">
        ✅ <strong>Request received!</strong> The full contact details will be sent to <strong>${esc(email)}</strong> shortly.
      </div>`;
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Request Contact Details →';
    alert('Something went wrong: ' + e.message);
  }
}

// ── Contact table ─────────────────────────────────────────────
const MASKED_COLS = ['ct_last_name','ct_email','ct_phone','ct_mobile_phone'];

function maskValue(col, val) {
  if (!val || val === 'null') return '—';
  const c = col.toLowerCase();
  if (c === 'ct_last_name') return val.charAt(0).toUpperCase() + '.';
  if (c === 'ct_email') { const [u,d]=val.split('@'); return d ? u.charAt(0)+'***@'+d : '***@***.***'; }
  if (c === 'ct_phone' || c === 'ct_mobile_phone') { const d=val.replace(/\D/g,''); return d.length>=4?'(***) ***-'+d.slice(-4):'***-****'; }
  return val;
}

function renderContactTable(cols, rows, masked) {
  const th = cols.map(c=>`<th>${esc(c)}</th>`).join('');
  const tb = rows.map(r=>'<tr>'+cols.map((col,i)=>{
    const raw=String(r[i]??'');
    const isMask=masked && MASKED_COLS.includes(col.toLowerCase());
    return `<td${isMask?' class="contact-masked"':''}>${isMask?maskValue(col,raw):esc(raw)}</td>`;
  }).join('')+'</tr>').join('');
  return `<table class="dt"><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table>`;
}

// ── Send ──────────────────────────────────────────────────────
async function send() {
  if (busy) return;
  const ta = document.getElementById('q');
  const q  = ta.value.trim();
  if (!q) return;

  ta.value=''; ta.style.height='auto';
  busy=true; turnNumber++;
  document.getElementById('send').disabled=true;

  appendMsg('user', `<div class="bubble">${esc(q)}</div>`);

  const placeholder = appendMsg('bot', `
    <div class="stage" id="stage">✦Thinking…</div>
    <div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>
  `);

  const setStage = (t,cls='') => {
    const el=document.getElementById('stage');
    if (el) { el.textContent=t; el.className='stage '+cls; }
    scrollBot();
  };

  try {
    setStage('✦Thinking…');

    const resp = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        question: q,
        chatHistory: Object.assign(history.filter(t=>t.question), { _rollingContext: history._rollingContext }),
        sessionToken,
        sessionId: SESSION_ID,
        turnNumber,
      })
    });

    setStage('✦Thinking…');
    const data = await resp.json();
    if (data.error) throw new Error(data.error);

    setStage('✓ Done', 'done');
    placeholder.remove();

    const sqlId  = 'sql_'  + Date.now();
    const tblId  = 'tbl_'  + Date.now();
    const chrId  = 'chr_'  + Date.now();

    // Helper: render key insights from server-provided insights string
    function buildInsights(insightsText) {
      if (!insightsText || insightsText.trim() === 'NONE' || insightsText.trim() === '') return '';
      const bullets = insightsText
        .split('\n')
        .map(l => l.replace(/^[-•*]\s*/, '').trim())
        .filter(l => l.length > 0)
        .slice(0, 3);
      if (!bullets.length) return '';
      return `<div class="insights-block" style="margin-top:10px;padding:10px 14px;background:var(--teal-pale);border:1px solid var(--border);border-radius:var(--radius);font-size:12.5px;">
        <div style="font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--navy);margin-bottom:7px;">💡 Key Insights</div>
        <ul style="margin:0;padding-left:16px;list-style:disc;display:flex;flex-direction:column;gap:5px;color:var(--text-mid);">
          ${bullets.map(b=>`<li>${fmt(b)}</li>`).join('')}
        </ul>
      </div>`;
    }

    // ── 1. Acknowledgment bubble ──
    let html = `<div class="bubble">${fmt(data.answer)}</div>`;

    const prettycols = data.prettycols || data.cols;

    function getTableDisplayIndices(cols) {
      const skipCols = new Set(['company_id','contact_id','signal_score','signal_date','rn']);
      const lowerCols = cols.map(c => c.toLowerCase());
      const hasCompanyRows = lowerCols.includes('company_name') && !lowerCols.some(c => c.startsWith('contact_'));
      const companyDisplayOrder = ['company_name', 'company_industry', 'fleet_size', 'companycity', 'companystate'];
      return hasCompanyRows
        ? companyDisplayOrder.map(c => lowerCols.indexOf(c)).filter(i => i !== -1)
        : cols.map((c,i) => skipCols.has(c.toLowerCase()) ? -1 : i).filter(i => i !== -1);
    }

    function isBlankDisplayValue(val) {
      return val == null || (typeof val === 'string' && val.trim() === '');
    }

    function isCompanyListingTable(cols, isListing, isContact) {
      const lowerCols = cols.map(c => c.toLowerCase());
      return isListing && !isContact && lowerCols.includes('company_name') && !lowerCols.some(c => c.startsWith('contact_'));
    }

    // Helper to build table
    function buildTable(cols, prettycols, rows) {
      const indices = getTableDisplayIndices(cols);
      const displayCols = prettycols || cols;
      const th = indices.map(i => `<th>${esc(displayCols[i] || cols[i])}</th>`).join('');
      const tb = (rows||[]).map(r => '<tr>' + indices.map(i => {
        const val = String(r[i] ?? '');
        // Make URLs clickable
        if (/^https?:\/\//i.test(val)) {
          return `<td><a href="${esc(val)}" target="_blank" rel="noopener" style="color:var(--blue);text-decoration:none">${esc(val.replace(/^https?:\/\/(www\.)?/,''))}</a></td>`;
        }
        return `<td>${esc(val)}</td>`;
      }).join('') + '</tr>').join('');
      return `<table class="dt"><thead><tr>${th}</tr></thead><tbody>${tb}</tbody></table>`;
    }

    if (data.cols?.length && data.rows?.length) {
      const rc         = data.rowCount ?? data.rows.length;
      const totalCount = data.totalCount ?? null;
      const isListing  = totalCount !== null;
      const isContact  = data.stage === 'CONTACT';
      const displayIndices = getTableDisplayIndices(data.cols);
      const shouldFilterCompanyRows = isCompanyListingTable(data.cols, isListing, isContact);
      const visibleRows = shouldFilterCompanyRows
        ? data.rows.filter(r => displayIndices.every(i => !isBlankDisplayValue(r[i])))
        : data.rows;
      const visibleRc  = shouldFilterCompanyRows ? visibleRows.length : rc;
      const hasFleet    = data.cols.some(c => c.toLowerCase() === 'fleet_size');
      const hasState    = data.cols.some(c => c.toLowerCase() === 'companystate' || c.toLowerCase() === 'company_state');
      const hasTAMSection = data.cols.some(c => c.toLowerCase() === 'section') && data.cols.some(c => c.toLowerCase() === 'breakdown_label');
      const hasIndustry = data.cols.some(c => c.toLowerCase() === 'company_industry');
      const hasRevenue  = data.cols.some(c => c.toLowerCase() === 'company_revenue_range');
      const showChart   = !isContact && (hasFleet || hasState || hasTAMSection || hasIndustry || hasRevenue);
      const label       = isContact ? '👤 Contacts' : '🏢 Companies';
      // Company listings may hide incomplete visible rows, so their label uses the filtered table count.
      const countLabel  = shouldFilterCompanyRows
        ? `<strong style="font-size:12.5px;color:var(--navy)">${visibleRc}</strong> result${visibleRc!==1?'s':''}`
        : isListing && !isContact
          ? `Top <strong style="font-size:12.5px;color:var(--navy)">${visibleRc}</strong> of <strong style="font-size:12.5px;color:var(--navy)">${Number(totalCount).toLocaleString()}</strong> result${totalCount!==1?'s':''}`
          : `<strong style="font-size:12.5px;color:var(--navy)">${visibleRc}</strong> result${visibleRc!==1?'s':''}`;

      // ── 2. Side-by-side: bar chart + table, then map below ──
      if (isContact) html += renderLeadGate(tblId, data.cols, data.rows, data.formAlreadyFilled);

      if (showChart) {
        // Bar chart + table side by side
        html += `
          <div class="block" id="chartblock_${chrId}">
            <div class="block-hd">
              <span class="block-label">📈 Analytics</span>
              <button class="block-toggle" onclick="toggleBlock('${chrId}',this)">hide</button>
            </div>
            <div id="filterbadges_${chrId}" style="display:none;padding:6px 12px;background:#f0f4fa;border-bottom:1px solid var(--border);font-size:11.5px;align-items:center;gap:6px;flex-wrap:wrap;"></div>
            <div class="block-body open" id="${chrId}">
              <div id="mapinner_${chrId}" class="map-container-block"></div>
              <div class="sidebyside-wrap">
                <div class="sidebyside-bar" id="barchart_${chrId}"></div>
                <div class="sidebyside-table">
                  <div class="block-hd" style="border-radius:0;border-left:1px solid var(--border);">
                    <span class="block-label">${label} · ${countLabel}</span>
                    <button class="block-toggle" onclick="toggleBlock('${tblId}',this)">hide</button>
                  </div>
                  <div class="block-body open" id="${tblId}" style="border-left:1px solid var(--border);">
                    <div class="tbl-wrap" id="tw_${tblId}">${buildTableWithFilter(data.cols, prettycols, visibleRows, chrId)}</div>
                  </div>
                </div>
              </div>
            </div>
          </div>`;
      } else {
        // No chart — plain table block
        html += `
          <div class="block">
            <div class="block-hd">
              <span class="block-label">${label} · ${countLabel}</span>
              <button class="block-toggle" onclick="toggleBlock('${tblId}',this)">hide</button>
            </div>
            <div class="block-body open" id="${tblId}">
              <div class="tbl-wrap" id="tw_${tblId}">${buildTable(data.cols, prettycols, visibleRows)}</div>
            </div>
          </div>`;
      }

      // ── 5. Key Insights ──
      html += buildInsights(data.insights);

      // Populate cross-filter stores for listing queries
      if (data.companySummaryRows?.rows?.length && isListing && !isContact) {
        summaryRowsStore.set(chrId, data.companySummaryRows.rows);
        filterStateStore.set(chrId, { state: null, fleet: null });
        const sumCols = data.companySummaryRows.cols;
        const CLIENT_COL_LABELS = {
          company_name:'Company', company_website:'Website', companycity:'City',
          companystate:'State', fleet_size:'Fleet Size', company_revenue_range:'Revenue Range',
          company_industry:'Industry'
        };
        const sumPrettycols = sumCols.map(c =>
          CLIENT_COL_LABELS[c.toLowerCase()] || c.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())
        );
        tableRowsStore.set(chrId, { cols: sumCols, prettycols: sumPrettycols, twId: 'tw_' + tblId });
      }
    }

    appendMsg('bot', html);

    // Attach table click delegation for cross-filtering (must be after DOM insert)
    if (summaryRowsStore.has(chrId)) {
      requestAnimationFrame(() => {
        const tw = document.getElementById('tw_' + tblId);
        if (tw) attachTableClickDelegation(tw, chrId);
      });
    }

    // Render charts after DOM insert
    if (data.cols?.length && data.rows?.length && data.stage !== 'CONTACT') {
      const hasInd   = data.cols.some(c => c.toLowerCase() === 'company_industry');
      const hasRev   = data.cols.some(c => c.toLowerCase() === 'company_revenue_range');
      const hasFleet = data.cols.some(c => c.toLowerCase() === 'fleet_size');
      const hasState = data.cols.some(c => c.toLowerCase() === 'companystate' || c.toLowerCase() === 'company_state');
      const hasTAM = data.cols.some(c => c.toLowerCase() === 'section') && data.cols.some(c => c.toLowerCase() === 'breakdown_label');
      // For listing queries (totalCount present), ONLY use chartData — never fall back to the 5-row table.
      // For TAM/aggregate queries, use the rows directly since they already contain breakdown data.
      const isListingQuery = data.totalCount !== null && data.totalCount !== undefined;
      const chartCols = data.chartData?.cols ?? (isListingQuery ? null : data.cols);
      const chartRows = data.chartData?.rows ?? (isListingQuery ? null : data.rows);
      const hasTAMChart  = chartCols?.some(c => c.toLowerCase() === 'section') && chartCols?.some(c => c.toLowerCase() === 'breakdown_label');
      const hasIndChart  = chartCols?.some(c => c.toLowerCase() === 'company_industry');
      const hasRevChart  = chartCols?.some(c => c.toLowerCase() === 'company_revenue_range');
      const hasFleetChart= chartCols?.some(c => c.toLowerCase() === 'fleet_size');
      const hasStateChart= chartCols?.some(c => c.toLowerCase() === 'companystate' || c.toLowerCase() === 'company_state');
      if (chartCols && chartRows && (hasInd || hasRev || hasFleet || hasState || hasTAM || hasTAMChart || hasIndChart || hasRevChart || hasFleetChart || hasStateChart)) {
        requestAnimationFrame(() => {
          const rendered = renderSmartCharts(chartCols, chartRows, `barchart_${chrId}`, `mapinner_${chrId}`);
          if (!rendered) {
            const blk = document.getElementById(`chartblock_${chrId}`);
            if (blk) blk.style.display = 'none';
          }
          scrollBot();
        });
      }
    }

    history.push({ question:q, sql:data.sql, explanation:data.explanation, interpretation:data.answer, rowCount:data.rowCount });
    // Carry rolling context forward so next turn's summary is incremental
    if (data._rollingContext) history._rollingContext = data._rollingContext;

  } catch(e) {
    placeholder.remove();
    appendMsg('bot', `<div class="stage err">✗ Error</div><div class="err-box">${esc(e.message)}</div>`);
  }

  busy=false;
  document.getElementById('send').disabled=false;
  scrollBot();
}
</script>
</body>
</html>
